<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para a Ana ❤</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #1a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Lato', sans-serif;
  overflow-x: hidden;
}

.page {
  width: 100%;
  max-width: 560px;
  padding: 40px 20px 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ===== TITLE ===== */
.title {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  color: #f7c5d0;
  text-align: center;
  letter-spacing: 2px;
  animation: fadeDown 1s ease both;
  margin-bottom: 6px;
}
.subtitle {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: #c47a8a;
  text-align: center;
  letter-spacing: 1px;
  animation: fadeDown 1.2s ease both;
  margin-bottom: 30px;
}

/* ===== HEART OF ROSES ===== */
.heart-container {
  position: relative;
  width: 340px;
  height: 320px;
  animation: heartPulse 3s ease-in-out infinite;
  transform-origin: center;
  flex-shrink: 0;
}

@keyframes heartPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

.heart-svg {
  width: 100%;
  height: 100%;
}

/* ===== PHOTOS STRIP ===== */
.photos-section {
  width: 100%;
  margin-top: 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.photos-row {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.photo-frame {
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid #8b3a52;
  box-shadow: 0 4px 24px rgba(180,60,90,0.35);
  flex-shrink: 0;
  animation: fadeUp 1s ease both;
}

.photo-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.photo-frame.large {
  width: 240px;
  height: 180px;
}

.photo-frame.medium {
  width: 155px;
  height: 155px;
}

.photo-frame.wide {
  width: 100%;
  height: 200px;
  border-radius: 18px;
}

/* ===== MESSAGE ===== */
.message-box {
  margin-top: 30px;
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(244,180,195,0.25);
  border-radius: 20px;
  padding: 28px 28px 24px;
  text-align: center;
  animation: fadeUp 1.6s ease both;
}

.message-box .name {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: #f7c5d0;
  margin-bottom: 14px;
}

.message-box p {
  font-size: 0.97rem;
  color: #d49aaa;
  line-height: 1.85;
  font-family: 'Playfair Display', serif;
  font-style: italic;
}

.message-box .sign {
  margin-top: 18px;
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: #f7a8be;
  letter-spacing: 1px;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes bloom {
  from { opacity: 0; transform: scale(0) rotate(-30deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

.rose { animation: bloom 0.5s ease-out both; }

/* floating petals background */
.petal {
  position: fixed;
  pointer-events: none;
  font-size: 16px;
  opacity: 0;
  animation: falling linear infinite;
}
@keyframes falling {
  0%   { opacity: 0; transform: translateY(-30px) rotate(0deg); }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.5; }
  100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
}
</style>

    <p>
      Cada rosa desse jardim representa<br>
      um momento especial ao seu lado.<br><br>

<script>
const emojis = ['🌸','🌹','✨','💕','🌺','💗'];
const container = document.getElementById('petals');
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.top = '-30px';
  const dur = 6 + Math.random() * 8;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = Math.random() * 4 + 's';
  el.style.fontSize = (12 + Math.random() * 14) + 'px';
  container.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}
setInterval(spawnPetal, 600);
for (let i = 0; i < 8; i++) spawnPetal();
</script>
